upstream fastcgi_backend {
    server php:9000;
}

server {
    listen 80;
    server_name _;
    root /var/www/html/pub;
    index index.php;
    charset utf-8;
    client_max_body_size 64M;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location /static/ {
        expires max;
        location ~ ^/static/version\d*/ {
            rewrite ^/static/version\d*/(.*)$ /static/$1 last;
        }
        if (!-f $request_filename) {
            rewrite ^/static/?(.*)$ /static.php?resource=$1 last;
        }
    }

    location /media/ {
        try_files $uri $uri/ /get.php?$args;
    }

    location /setup/ {
        try_files $uri $uri/ /setup/index.php?$args;
    }

    location /update/ {
        try_files $uri $uri/ /update/index.php?$args;
    }

    location ~ (index|get|static|report|health_check|setup/index|setup/ajax|update/index|update/ajax)\.php$ {
        fastcgi_pass fastcgi_backend;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_FLAG "session.auto_start=off \n suhosin.session.cryptua=off";
        fastcgi_param PHP_VALUE "memory_limit=2G \n max_execution_time=1800";
        fastcgi_read_timeout 1800s;
        fastcgi_connect_timeout 60s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 192k;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~* \.(ico|jpg|jpeg|png|gif|svg|js|css|webp|avif|woff|woff2)$ {
        expires 1y;
        access_log off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
